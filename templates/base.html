<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}금융 자산 관리{% endblock %} | 개인 금융 관리</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/static/css/style.css?v=10" rel="stylesheet">
</head>
<body>

<!-- 사이드바 -->
<nav id="sidebar" class="d-flex flex-column flex-shrink-0 p-3 text-white">
  <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none">
    <i class="bi bi-piggy-bank-fill fs-4 me-2"></i>
    <span class="fs-5 fw-bold">금융 자산 관리</span>
  </a>
  <hr>
  <ul class="nav nav-pills flex-column mb-auto">
    <li class="nav-item">
      <a href="/" class="nav-link text-white {% if request.path == '/' %}active{% endif %}">
        <i class="bi bi-speedometer2 me-2"></i>대시보드
      </a>
    </li>
    <li class="nav-item">
      <a href="/income" class="nav-link text-white {% if request.path == '/income' %}active{% endif %}">
        <i class="bi bi-cash-coin me-2"></i>수입 관리
      </a>
    </li>
    <li class="nav-item">
      <a href="/budget" class="nav-link text-white {% if request.path == '/budget' %}active{% endif %}">
        <i class="bi bi-receipt me-2"></i>가계부
      </a>
    </li>
    <li class="nav-item">
      <a href="/cards" class="nav-link text-white {% if request.path == '/cards' %}active{% endif %}">
        <i class="bi bi-credit-card me-2"></i>카드 관리
      </a>
    </li>
    <li class="nav-item">
      <a href="/fund-management" class="nav-link text-white {% if request.path == '/fund-management' %}active{% endif %}">
        <i class="bi bi-wallet2 me-2"></i>자금 관리
      </a>
    </li>
    <li class="nav-item">
      <a href="/investments" class="nav-link text-white {% if request.path == '/investments' %}active{% endif %}">
        <i class="bi bi-graph-up-arrow me-2"></i>투자 관리
      </a>
    </li>
    <li class="nav-item">
      <a href="/realestate" class="nav-link text-white {% if request.path == '/realestate' %}active{% endif %}">
        <i class="bi bi-house-door me-2"></i>부동산
      </a>
    </li>
    <li class="nav-item">
      <a href="/loans" class="nav-link text-white {% if request.path == '/loans' %}active{% endif %}">
        <i class="bi bi-bank me-2"></i>대출
      </a>
    </li>
    <li class="nav-item">
      <a href="/pension" class="nav-link text-white {% if request.path == '/pension' %}active{% endif %}">
        <i class="bi bi-person-check me-2"></i>연금
      </a>
    </li>
    <li class="nav-item">
      <a href="/goals" class="nav-link text-white {% if request.path == '/goals' %}active{% endif %}">
        <i class="bi bi-trophy me-2"></i>목표저축
      </a>
    </li>
    <li class="nav-item">
      <a href="/monthly" class="nav-link text-white {% if request.path == '/monthly' %}active{% endif %}">
        <i class="bi bi-calendar3 me-2"></i>월별 결산
      </a>
    </li>
  </ul>

  <hr class="border-secondary">
  <div class="d-grid px-1">
    <a href="/sync" class="btn btn-sm btn-outline-light {% if request.path == '/sync' %}active{% endif %}">
      <i class="bi bi-arrow-left-right me-1"></i>데이터 동기화
    </a>
  </div>
</nav>

<!-- 메인 콘텐츠 -->
<div id="main-content">
  <div class="container-fluid py-4 px-4">
    {% block content %}{% endblock %}
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script src="/static/js/common.js?v=10"></script>
{% block scripts %}{% endblock %}
</body>
</html>
