{% extends "base.html" %}
{% block title %}대시보드{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
  <h2 class="fw-bold mb-0"><i class="bi bi-speedometer2 me-2 text-primary"></i>대시보드</h2>
  <div class="d-flex gap-2 align-items-center">
    <select id="dashYear"  class="form-select form-select-sm" style="width:90px"></select>
    <select id="dashMonth" class="form-select form-select-sm" style="width:80px"></select>
    <button class="btn btn-sm btn-primary" onclick="reloadDashboard()">
      <i class="bi bi-search me-1"></i>조회
    </button>
  </div>
</div>

<!-- 만료 임박 배너 -->
<div id="dashExpiringBanner" class="mb-3"></div>

<!-- 요약 카드 -->
<div class="row g-3 mb-4">
  <div class="col-6 col-lg-3">
    <div class="card summary-card border-0 shadow-sm h-100">
      <div class="card-body">
        <div class="d-flex align-items-center mb-2">
          <div class="icon-box bg-primary-subtle text-primary me-3"><i class="bi bi-wallet2"></i></div>
          <span class="text-muted small">순자산</span>
        </div>
        <div class="fs-4 fw-bold" id="kpi-networth">-</div>
      </div>
    </div>
  </div>
  <div class="col-6 col-lg-3">
    <div class="card summary-card border-0 shadow-sm h-100">
      <div class="card-body">
        <div class="d-flex align-items-center mb-2">
          <div class="icon-box bg-success-subtle text-success me-3"><i class="bi bi-arrow-down-circle"></i></div>
          <span class="text-muted small" id="label-income">이번달 수입</span>
        </div>
        <div class="fs-4 fw-bold text-success" id="kpi-income">-</div>
      </div>
    </div>
  </div>
  <div class="col-6 col-lg-3">
    <div class="card summary-card border-0 shadow-sm h-100">
      <div class="card-body">
        <div class="d-flex align-items-center mb-2">
          <div class="icon-box bg-danger-subtle text-danger me-3"><i class="bi bi-arrow-up-circle"></i></div>
          <span class="text-muted small" id="label-expense">이번달 지출</span>
        </div>
        <div class="fs-4 fw-bold text-danger" id="kpi-expense">-</div>
      </div>
    </div>
  </div>
  <div class="col-6 col-lg-3">
    <div class="card summary-card border-0 shadow-sm h-100">
      <div class="card-body">
        <div class="d-flex align-items-center mb-2">
          <div class="icon-box bg-warning-subtle text-warning me-3"><i class="bi bi-bank"></i></div>
          <span class="text-muted small">총 대출잔액</span>
        </div>
        <div class="fs-4 fw-bold text-warning" id="kpi-loans">-</div>
      </div>
    </div>
  </div>
</div>

<!-- 차트 행 1 -->
<div class="row g-3 mb-4">
  <div class="col-lg-7">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-header bg-white fw-semibold border-0 pt-3">
        <i class="bi bi-bar-chart-line me-2 text-primary"></i><span id="label-chart-ie">이번달</span> 수입/지출 (카테고리별)
      </div>
      <div class="card-body">
        <canvas id="chartIncomeExpense" height="220"></canvas>
      </div>
    </div>
  </div>
  <div class="col-lg-5">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-header bg-white fw-semibold border-0 pt-3">
        <i class="bi bi-pie-chart me-2 text-primary"></i>자산 배분
      </div>
      <div class="card-body d-flex align-items-center justify-content-center">
        <canvas id="chartAssets" style="max-height:240px"></canvas>
      </div>
    </div>
  </div>
</div>

<!-- 차트 행 2 -->
<div class="row g-3 mb-4">
  <div class="col-lg-6">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-header bg-white fw-semibold border-0 pt-3">
        <i class="bi bi-graph-up me-2 text-primary"></i>투자 수익률
      </div>
      <div class="card-body">
        <canvas id="chartReturns" height="200"></canvas>
      </div>
    </div>
  </div>
  <div class="col-lg-6">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-header bg-white fw-semibold border-0 pt-3">
        <i class="bi bi-bank me-2 text-primary"></i>대출 잔액 현황
      </div>
      <div class="card-body">
        <canvas id="chartLoans" height="200"></canvas>
      </div>
    </div>
  </div>
</div>

<!-- 목표저축 -->
<div class="row g-3">
  <div class="col-12">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-white fw-semibold border-0 pt-3">
        <i class="bi bi-trophy me-2 text-primary"></i>목표저축 달성률
      </div>
      <div class="card-body" id="goals-progress">
        <p class="text-muted text-center">데이터 로딩 중...</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/dashboard.js"></script>
{% endblock %}
