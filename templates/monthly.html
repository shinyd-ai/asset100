{% extends "base.html" %}
{% block title %}월별 결산{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="fw-bold mb-0"><i class="bi bi-calendar3 me-2 text-primary"></i>월별 결산</h2>
  <div class="d-flex align-items-center gap-2">
    <select id="yearSelect" class="form-select form-select-sm" style="width:120px"></select>
    <button class="btn btn-sm btn-primary" onclick="loadData()">조회</button>
  </div>
</div>

<!-- 연간 차트 -->
<div class="card border-0 shadow-sm mb-4">
  <div class="card-header bg-white fw-semibold border-0 pt-3">
    <i class="bi bi-bar-chart me-2 text-primary"></i>월별 수입/지출/저축 추이
  </div>
  <div class="card-body">
    <canvas id="chartMonthly" height="120"></canvas>
  </div>
</div>

<!-- 월별 테이블 -->
<div class="card border-0 shadow-sm">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>월</th>
            <th class="text-end text-success">수입</th>
            <th class="text-end text-danger">지출</th>
            <th class="text-end text-primary">저축</th>
            <th class="text-end">저축률</th>
          </tr>
        </thead>
        <tbody id="dataBody"></tbody>
        <tfoot class="table-light fw-bold" id="dataFoot"></tfoot>
      </table>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let chart = null;
const yearSel = document.getElementById('yearSelect');
const curYear = new Date().getFullYear();
for (let y = curYear; y >= curYear - 4; y--) {
  yearSel.innerHTML += `<option value="${y}">${y}년</option>`;
}

async function loadData() {
  const year = yearSel.value;
  const rows = await fetchJSON(`/api/monthly-summary?year=${year}`);
  const tbody = document.getElementById('dataBody');
  const tfoot = document.getElementById('dataFoot');

  let totalInc = 0, totalExp = 0, totalSav = 0;
  const labels = [], incData = [], expData = [], savData = [];

  tbody.innerHTML = rows.map(r => {
    totalInc += r.income; totalExp += r.expense; totalSav += r.saving;
    const savRate = r.income ? Math.round(r.saving / r.income * 100) : 0;
    const month = r.month.split('-')[1] + '월';
    labels.push(month);
    incData.push(r.income);
    expData.push(r.expense);
    savData.push(r.saving);
    return `<tr class="${r.income === 0 && r.expense === 0 ? 'text-muted' : ''}">
      <td class="fw-semibold">${r.month}</td>
      <td class="text-end text-success">${fmt(r.income)}원</td>
      <td class="text-end text-danger">${fmt(r.expense)}원</td>
      <td class="text-end ${r.saving >= 0 ? 'text-primary' : 'text-danger'} fw-semibold">${fmt(r.saving)}원</td>
      <td class="text-end">
        <span class="badge ${savRate >= 30 ? 'bg-success' : savRate >= 10 ? 'bg-warning text-dark' : 'bg-danger'}">${savRate}%</span>
      </td>
    </tr>`;
  }).join('');

  const totalSavRate = totalInc ? Math.round(totalSav / totalInc * 100) : 0;
  tfoot.innerHTML = `<tr>
    <td>합계</td>
    <td class="text-end text-success">${fmt(totalInc)}원</td>
    <td class="text-end text-danger">${fmt(totalExp)}원</td>
    <td class="text-end ${totalSav >= 0 ? 'text-primary' : 'text-danger'}">${fmt(totalSav)}원</td>
    <td class="text-end"><span class="badge ${totalSavRate >= 30 ? 'bg-success' : 'bg-warning text-dark'}">${totalSavRate}%</span></td>
  </tr>`;

  // 차트 그리기
  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('chartMonthly'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: '수입', data: incData, backgroundColor: 'rgba(25,135,84,0.7)' },
        { label: '지출', data: expData, backgroundColor: 'rgba(220,53,69,0.7)' },
        { label: '저축', data: savData, backgroundColor: 'rgba(13,110,253,0.7)', type: 'line', tension: 0.3, fill: false, borderColor: 'rgba(13,110,253,0.9)', pointRadius: 4 },
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { position: 'top' } },
      scales: {
        y: { ticks: { callback: v => (v/10000).toFixed(0) + '만' } }
      }
    }
  });
}

loadData();
</script>
{% endblock %}
